# Title Priority Profiles
# Each profile defines regex patterns (case-insensitive) matched against the cleaned Title.
# Matching order: high → medium → low → "Not relevant" (first match wins).
#
# Add new profiles by copy-pasting a block and editing the patterns.

Finance:
  description: "Finance sector — Data Engineering, Security, IT & Tech leadership"
  priorities:
    high:
      # Data Engineering / Data Platform
      - '(vp|vice president|director|head|chief).{0,35}(data engineering|data platform)'
      # CTO / Chief Technology Officer
      - '\bcto\b|chief technology officer'
      # Technology VP/Director/Head (general)
      - '(vp|vice president|director|head|chief).{0,35}technolog'
      # Technical / Technology Manager
      - 'technolog(y|ical)?\s+(manager|director|lead|officer)'
      - 'technical\s+(manager|director|lead|officer)'
      # Solutions / Enterprise / Technical Architecture
      - '(vp|vice president|director|head|chief).{0,40}architect'
      # CISO / Information Security / Data Privacy / Security Risk
      - '\bciso\b|chief information security officer'
      - '(vp|vice president|director|head|chief).{0,35}(information security|cybersecurity|cyber security|infosec|info sec|data privacy|security risk)'
      # "Head of Security" / "VP of Security" (LLM may strip "Information" qualifier)
      - '(vp|vice president|director|head|chief).{0,20}security'
      # "Manager of Technology" (LLM reformats "Technology Manager" → "Manager of Technology")
      - 'manager.{0,5}of.{0,10}(technology|information technology)'
      # CAO — Chief Analytics Officer (abbreviation)
      - '\bcao\b|chief analytics officer'
      # CIO / Head of IT (excluding Operations/Infrastructure)
      - '\bcio\b|chief information officer'
      - '(vp|vice president|director|head|chief).{0,35}\bit\b(?!.{0,40}(operations|infrastructure|infra))'
      # Engineering leadership
      - '(chief|vp|vice president|director|head).{0,35}engineering'
      # Analytics leadership
      - '(chief|vp|vice president|director|head).{0,35}analytics'
    medium:
      # CEO / President / GM / MD
      - '\bceo\b|chief executive officer|\bpresident\b|general manager|managing director'
      # COO / Head of Operations
      - '\bcoo\b|chief operating officer'
      - '(vp|vice president|director|head).{0,35}operations'
      # Delivery / Development / R&D / Transformation / Strategy (tech-focused)
      - '(chief|vp|vice president|director|head).{0,35}(delivery|development|r&d|research and development|transformation|strategy)'
      # Chief Development Officer (CDO) — note: Chief DATA Officer is High via data engineering pattern
      - '\bcdo\b|chief development officer'
      # Product
      - '\bcpo\b|chief product officer'
      - '(vp|vice president|director|head|chief).{0,35}product'
      - 'product\s+(owner|manager)'
    low:
      # Founders and co-owners only — "Platform Owner", "Case Owner" etc. are NOT company owners
      - '\bfounder\b|co-?founder|co founder'
      - '\bco-?owner\b|co owner'
      # Standalone "Owner" title only (not "Platform Owner", "Technical Owner", etc.)
      - '^owner$'

B2B_SaaS:
  description: "B2B SaaS — Engineering, Product, Data leadership"
  priorities:
    high:
      - '\bcto\b|chief technology officer'
      - '\bcpo\b|chief product officer'
      - '(vp|vice president|director|head|chief).{0,35}engineering'
      - '(vp|vice president|director|head|chief).{0,35}(product|platform)'
      - '(vp|vice president|director|head|chief).{0,35}(data|analytics|machine learning|ai\b|ml\b)'
      - '(vp|vice president|director|head|chief).{0,35}technolog'
      - '\bciso\b|chief information security officer'
      - '(vp|vice president|director|head|chief).{0,35}(information security|cybersecurity)'
    medium:
      - '\bceo\b|chief executive officer|\bpresident\b|general manager|managing director'
      - '\bcoo\b|chief operating officer'
      - '(vp|vice president|director|head).{0,35}(operations|strategy|transformation|r&d|research)'
      - 'product\s+(owner|manager)'
      - '(vp|vice president|director|head).{0,35}(delivery|development)'
    low:
      - '\bfounder\b|co-?founder|co founder'
      - '\bco-?owner\b|co owner'
      - '^owner$'
